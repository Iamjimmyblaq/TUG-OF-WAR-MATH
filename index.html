<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Tug of War: Mathematics - Nigeria Edition</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiVHVnIG9mIFdhcjogTWF0aGVtYXRpY3MiLCJzaG9ydF9uYW1lIjoiTWF0aCBUdWciLCJzdGFydF91cmwiOiIuIiwiZGlzcGxheSI6InN0YW5kYWxvbmUiLCJiYWNrZ3JvdW5kX2NvbG9yIjoiIzY2N2VlYSIsInRoZW1lX2NvbG9yIjoiIzY2N2VlYSJ9">
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCBmaWxsPSIjNjY3ZWVhIiB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgcng9IjIwIi8+PHRleHQgeD0iNTAiIHk9IjY1IiBmb250LXNpemU9IjUwIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIj7wn5epPC90ZXh0Pjwvc3ZnPg==">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        html, body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }

        /* Force landscape */
        @media screen and (orientation: portrait) and (max-height: 900px) {
            .game-wrapper {
                display: none !important;
            }
            .rotate-warning {
                display: flex !important;
            }
        }

        .rotate-warning {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a2e;
            z-index: 10000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .rotate-icon {
            font-size: 100px;
            animation: rotatePhone 2s ease-in-out infinite;
            margin-bottom: 20px;
        }

        @keyframes rotatePhone {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(90deg); }
        }

        .game-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header - Compact */
        .header {
            flex: 0 0 auto;
            height: clamp(40px, 8vh, 60px);
            min-height: 40px;
            background: rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 clamp(10px, 2vw, 20px);
            gap: 10px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .home-btn {
            background: white;
            border: none;
            padding: clamp(5px, 1vh, 8px) clamp(10px, 2vw, 15px);
            border-radius: 20px;
            font-weight: 700;
            color: #667eea;
            font-size: clamp(10px, 1.5vw, 12px);
            cursor: pointer;
            white-space: nowrap;
        }

        .title {
            color: white;
            font-size: clamp(12px, 2.5vw, 18px);
            font-weight: 800;
            white-space: nowrap;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: clamp(5px, 1vw, 10px);
        }

        .audio-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid white;
            color: white;
            padding: clamp(3px, 0.8vh, 5px) clamp(6px, 1.5vw, 10px);
            border-radius: 15px;
            font-size: clamp(8px, 1.2vw, 10px);
            cursor: pointer;
            white-space: nowrap;
        }

        .audio-btn.muted {
            opacity: 0.5;
            text-decoration: line-through;
        }

        .flag {
            width: clamp(25px, 4vw, 35px);
            height: clamp(16px, 2.5vh, 20px);
            background: linear-gradient(to right, #008751 33%, white 33%, white 66%, #008751 66%);
            border-radius: 3px;
            flex-shrink: 0;
        }

        /* Commentary Bar */
        .commentary {
            flex: 0 0 auto;
            min-height: clamp(30px, 6vh, 40px);
            background: linear-gradient(90deg, #1a1a2e, #16213e);
            color: #FFD700;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px clamp(10px, 2vw, 20px);
            font-size: clamp(10px, 1.8vw, 14px);
            font-weight: 700;
            text-align: center;
            border-bottom: 2px solid #FFD700;
            overflow: hidden;
        }

        /* Main Game Area */
        .game-area {
            flex: 1 1 auto;
            display: flex;
            align-items: stretch;
            justify-content: center;
            gap: clamp(5px, 1.5vw, 15px);
            padding: clamp(5px, 1.5vh, 10px);
            min-height: 0;
        }

        /* Team Panels */
        .team-panel {
            flex: 0 0 auto;
            width: clamp(140px, 22vw, 260px);
            background: white;
            border-radius: clamp(10px, 2vw, 15px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .team-panel.team1 {
            border-left: clamp(3px, 0.8vw, 5px) solid #2196F3;
        }

        .team-panel.team2 {
            border-right: clamp(3px, 0.8vw, 5px) solid #f44336;
        }

        .panel-header {
            flex: 0 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: clamp(6px, 1.5vh, 12px);
            margin: clamp(5px, 1vh, 10px);
            border-radius: 8px;
        }

        .team1 .panel-header {
            background: #E3F2FD;
            color: #1976D2;
        }

        .team2 .panel-header {
            background: #FFEBEE;
            color: #C62828;
        }

        .team-label {
            font-weight: 800;
            font-size: clamp(11px, 1.8vw, 16px);
        }

        .team-score {
            background: white;
            padding: clamp(2px, 0.5vh, 5px) clamp(8px, 1.5vw, 12px);
            border-radius: 15px;
            font-weight: 700;
            font-size: clamp(14px, 2.5vw, 20px);
        }

        .team1 .team-score { color: #2196F3; }
        .team2 .team-score { color: #f44336; }

        .problem {
            flex: 0 0 auto;
            text-align: center;
            font-size: clamp(18px, 4vw, 32px);
            font-weight: 800;
            padding: clamp(5px, 1.5vh, 15px) clamp(5px, 1vw, 10px);
            color: #333;
            line-height: 1.2;
        }

        .answer-box {
            flex: 0 0 auto;
            margin: 0 clamp(8px, 1.5vw, 15px) clamp(8px, 2vh, 15px);
            height: clamp(35px, 8vh, 55px);
            min-height: 35px;
            border: 3px solid #ddd;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(20px, 4vw, 28px);
            font-weight: 700;
            background: #f8f9fa;
            transition: all 0.3s;
        }

        .answer-box.correct {
            border-color: #4CAF50;
            background: #E8F5E9;
            color: #2E7D32;
        }

        .answer-box.wrong {
            border-color: #f44336;
            background: #FFEBEE;
            color: #C62828;
        }

        /* Keypad - Flexible Grid */
        .keypad {
            flex: 1 1 auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: clamp(4px, 1vh, 10px);
            padding: 0 clamp(8px, 1.5vw, 15px) clamp(8px, 2vh, 15px);
            min-height: 0;
        }

        .key {
            width: 100%;
            height: 100%;
            min-height: 30px;
            border: none;
            border-radius: clamp(6px, 1.5vw, 10px);
            font-size: clamp(16px, 3vw, 24px);
            font-weight: 700;
            cursor: pointer;
            background: #f0f0f0;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
        }

        .key:active {
            transform: scale(0.95);
            background: #e0e0e0;
        }

        .key.clear {
            background: #ff5252;
            color: white;
        }

        .key.clear:active {
            background: #ff1744;
        }

        .team1 .key.submit {
            background: #2196F3;
            color: white;
        }

        .team1 .key.submit:active {
            background: #1976D2;
        }

        .team2 .key.submit {
            background: #f44336;
            color: white;
        }

        .team2 .key.submit:active {
            background: #d32f2f;
        }

        /* Center Battlefield */
        .battlefield {
            flex: 1 1 auto;
            min-width: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: clamp(5px, 2vh, 20px);
        }

        .score-display {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            gap: clamp(10px, 3vw, 30px);
            background: rgba(255,255,255,0.95);
            padding: clamp(8px, 2vh, 15px) clamp(15px, 4vw, 40px);
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .score-item {
            text-align: center;
        }

        .score-name {
            font-size: clamp(9px, 1.5vw, 12px);
            color: #666;
            font-weight: 700;
            text-transform: uppercase;
        }

        .score-num {
            font-size: clamp(20px, 5vw, 36px);
            font-weight: 800;
            line-height: 1;
        }

        .score-num.s1 { color: #2196F3; }
        .score-num.s2 { color: #f44336; }

        .timer {
            font-size: clamp(16px, 3vw, 24px);
            font-weight: 800;
            background: #FFD700;
            padding: clamp(5px, 1.5vh, 10px) clamp(10px, 3vw, 20px);
            border-radius: 20px;
            min-width: clamp(60px, 12vw, 90px);
            text-align: center;
        }

        /* Tug of War Visual */
        .war-zone {
            flex: 1 1 auto;
            width: 100%;
            min-height: 0;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ground-line {
            position: absolute;
            bottom: 15%;
            left: 10%;
            right: 10%;
            height: 3px;
            background: #8D6E63;
            border-radius: 2px;
        }

        .center-mark {
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            width: 3px;
            height: 90%;
            background: repeating-linear-gradient(
                to bottom,
                #999 0px,
                #999 6px,
                transparent 6px,
                transparent 12px
            );
        }

        .rope-container {
            position: relative;
            width: clamp(200px, 50vw, 400px);
            height: clamp(100px, 25vh, 200px);
        }

        .rope {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: clamp(4px, 1vh, 8px);
            background: linear-gradient(90deg, #5D4037, #8D6E63, #5D4037);
            border-radius: 4px;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .rope-knot {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: clamp(12px, 3vw, 20px);
            height: clamp(12px, 3vw, 20px);
            background: #3E2723;
            border-radius: 50%;
        }

        .flag {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: clamp(15px, 4vw, 25px);
            height: clamp(20px, 5vw, 35px);
            background: linear-gradient(135deg, #FFD700, #FFA000);
            clip-path: polygon(0 0, 100% 50%, 0 100%);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .team-figures {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .figure {
            position: absolute;
            bottom: 20%;
            width: clamp(30px, 8vw, 50px);
            height: clamp(50px, 15vh, 80px);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .fig-left { left: 0; }
        .fig-right { right: 0; transform: scaleX(-1); }

        .fig-head {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40%;
            height: 25%;
            background: #FFCC80;
            border-radius: 50%;
        }

        .fig-body {
            position: absolute;
            top: 28%;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 45%;
            border-radius: 8px;
        }

        .team1 .fig-body { background: #2196F3; }
        .team2 .fig-body { background: #f44336; }

        .fig-legs {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 25%;
            display: flex;
            gap: 10%;
        }

        .fig-leg {
            flex: 1;
            background: #333;
            border-radius: 0 0 4px 4px;
        }

        .fig-arm {
            position: absolute;
            top: 35%;
            width: 50%;
            height: 8%;
            background: #FFCC80;
            border-radius: 4px;
        }

        .fig-left .fig-arm { right: -30%; transform: rotate(-20deg); }
        .fig-right .fig-arm { left: -30%; transform: rotate(20deg); }

        /* Winner Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.show {
            display: flex;
        }

        .modal-card {
            background: white;
            border-radius: 20px;
            padding: clamp(20px, 5vh, 40px);
            text-align: center;
            max-width: 90vw;
            width: clamp(300px, 80vw, 500px);
            animation: popIn 0.5s;
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .trophy {
            font-size: clamp(50px, 15vw, 80px);
            margin-bottom: 10px;
        }

        .winner-title {
            font-size: clamp(24px, 6vw, 36px);
            font-weight: 800;
            margin-bottom: 10px;
        }

        .winner-title.w1 { color: #2196F3; }
        .winner-title.w2 { color: #f44336; }

        .winner-sub {
            font-size: clamp(14px, 3vw, 18px);
            color: #666;
            margin-bottom: 20px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: clamp(20px, 8vw, 50px);
            margin-bottom: 20px;
        }

        .stat-box {
            text-align: center;
        }

        .stat-num {
            font-size: clamp(28px, 7vw, 40px);
            font-weight: 800;
            color: #333;
        }

        .stat-label {
            font-size: clamp(10px, 2vw, 12px);
            color: #666;
            text-transform: uppercase;
        }

        .again-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: clamp(12px, 3vh, 18px) clamp(30px, 10vw, 50px);
            font-size: clamp(14px, 3vw, 18px);
            font-weight: 700;
            border-radius: 30px;
            cursor: pointer;
        }

        /* Confetti */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            pointer-events: none;
            z-index: 10000;
        }

        /* Install Prompt */
        .install-prompt {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 15px 25px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            z-index: 9998;
            display: none;
            align-items: center;
            gap: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .install-prompt.show {
            display: flex;
        }

        .install-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 700;
            cursor: pointer;
            font-size: 12px;
        }

        .close-prompt {
            background: none;
            border: none;
            color: #999;
            font-size: 20px;
            cursor: pointer;
            margin-left: 10px;
        }

        /* Utility */
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <!-- Rotate Warning -->
    <div class="rotate-warning">
        <div class="rotate-icon">📱</div>
        <h2 style="font-size: 24px; margin-bottom: 15px;">Rotate Your Device</h2>
        <p style="font-size: 16px; line-height: 1.5;">
            This game works best in landscape mode.<br>
            Please turn your device sideways.
        </p>
    </div>

    <!-- Main Game -->
    <div class="game-wrapper">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <button class="home-btn" onclick="resetGame()">🏠 HOME</button>
                <span class="title">TUG OF WAR MATH 🇳🇬</span>
            </div>
            <div class="header-right">
                <button class="audio-btn" id="btnMusic" onclick="toggleAudio('music')">🎵 Music</button>
                <button class="audio-btn" id="btnVoice" onclick="toggleAudio('voice')">🎙️ Voice</button>
                <div class="flag"></div>
            </div>
        </div>

        <!-- Commentary -->
        <div class="commentary" id="commentary">Welcome! May the best team win!</div>

        <!-- Game Area -->
        <div class="game-area">
            <!-- Team 1 -->
            <div class="team-panel team1">
                <div class="panel-header">
                    <span class="team-label">Team 1</span>
                    <span class="team-score" id="scoreBadge1">0</span>
                </div>
                <div class="problem" id="prob1">7 + 4 = ?</div>
                <div class="answer-box" id="ans1"></div>
                <div class="keypad">
                    <button class="key" ontouchstart="return true" onclick="pressKey(1,1)">1</button>
                    <button class="key" ontouchstart="return true" onclick="pressKey(1,2)">2</button>
                    <button class="key" ontouchstart="return true" onclick="pressKey(1,3)">3</button>
                    <button class="key" ontouchstart="return true" onclick="pressKey(1,4)">4</button>
                    <button class="key" ontouchstart="return true" onclick="pressKey(1,5)">5</button>
                    <button class="key" ontouchstart="return true" onclick="pressKey(1,6)">6</button>
                    <button class="key" ontouchstart="return true" onclick="pressKey(1,7)">7</button>
                    <button class="key" ontouchstart="return true" onclick="pressKey(1,8)">8</button>
                    <button class="key" ontouchstart="return true" onclick="pressKey(1,9)">9</button>
                    <button class="key clear" ontouchstart="return true" onclick="pressKey(1,'clear')">✕</button>
                    <button class="key" ontouchstart="return true" onclick="pressKey(1,0)">0</button>
                    <button class="key submit" ontouchstart="return true" onclick="pressKey(1,'submit')">✓</button>
                </div>
            </div>

            <!-- Battlefield -->
            <div class="battlefield">
                <div class="score-display">
                    <div class="score-item">
                        <div class="score-name">Team 1</div>
                        <div class="score-num s1" id="mainScore1">0</div>
                    </div>
                    <div class="timer" id="timer">00:00</div>
                    <div class="score-item">
                        <div class="score-name">Team 2</div>
                        <div class="score-num s2" id="mainScore2">0</div>
                    </div>
                </div>

                <div class="war-zone">
                    <div class="ground-line"></div>
                    <div class="center-mark"></div>
                    
                    <div class="rope-container">
                        <div class="team-figures" id="figs1">
                            <div class="figure fig-left">
                                <div class="fig-head"></div>
                                <div class="fig-body"></div>
                                <div class="fig-arm"></div>
                                <div class="fig-legs"><div class="fig-leg"></div><div class="fig-leg"></div></div>
                            </div>
                        </div>
                        <div class="team-figures" id="figs2">
                            <div class="figure fig-right">
                                <div class="fig-head"></div>
                                <div class="fig-body"></div>
                                <div class="fig-arm"></div>
                                <div class="fig-legs"><div class="fig-leg"></div><div class="fig-leg"></div></div>
                            </div>
                        </div>
                        <div class="rope" id="rope">
                            <div class="rope-knot"></div>
                        </div>
                        <div class="flag" id="flag"></div>
                    </div>
                </div>
            </div>

            <!-- Team 2 -->
            <div class="team-panel team2">
                <div class="panel-header">
                    <span class="team-label">Team 2</span>
                    <span class="team-score" id="scoreBadge2">0</span>
                </div>
                <div class="problem" id="prob2">9 + 6 = ?</div>
                <div class="answer-box" id="ans2"></div>
                <div class="keypad">
                    <button class="key" ontouchstart="return true" onclick="pressKey(2,1)">1</button>
                    <button class="key" ontouchstart="return true" onclick="pressKey(2,2)">2</button>
                    <button class="key" ontouchstart="return true" onclick="pressKey(2,3)">3</button>
                    <button class="key" ontouchstart="return true" onclick="pressKey(2,4)">4</button>
                    <button class="key" ontouchstart="return true" onclick="pressKey(2,5)">5</button>
                    <button class="key" ontouchstart="return true" onclick="pressKey(2,6)">6</button>
                    <button class="key" ontouchstart="return true" onclick="pressKey(2,7)">7</button>
                    <button class="key" ontouchstart="return true" onclick="pressKey(2,8)">8</button>
                    <button class="key" ontouchstart="return true" onclick="pressKey(2,9)">9</button>
                    <button class="key clear" ontouchstart="return true" onclick="pressKey(2,'clear')">✕</button>
                    <button class="key" ontouchstart="return true" onclick="pressKey(2,0)">0</button>
                    <button class="key submit" ontouchstart="return true" onclick="pressKey(2,'submit')">✓</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Winner Modal -->
    <div class="modal" id="modal">
        <div class="modal-card">
            <div class="trophy">🏆</div>
            <h2 class="winner-title" id="winTitle">Team 1 Wins!</h2>
            <p class="winner-sub" id="winSub">Fantastic!</p>
            <div class="stats">
                <div class="stat-box">
                    <div class="stat-num" id="winScore">0</div>
                    <div class="stat-label">Correct</div>
                </div>
                <div class="stat-box">
                    <div class="stat-num" id="winTime">00:00</div>
                    <div class="stat-label">Time</div>
                </div>
            </div>
            <button class="again-btn" onclick="resetGame()">↻ PLAY AGAIN</button>
        </div>
    </div>

    <!-- Install Prompt -->
    <div class="install-prompt" id="installPrompt">
        <span>📲 Install this app?</span>
        <button class="install-btn" onclick="installApp()">Install</button>
        <button class="close-prompt" onclick="closeInstallPrompt()">×</button>
    </div>

    <script>
        // Game State
        const state = {
            scores: { 1: 0, 2: 0 },
            answers: { 1: '', 2: '' },
            problems: { 1: null, 2: null },
            ropePos: 0,
            startTime: Date.now(),
            timer: null,
            ended: false,
            audio: { music: true, voice: true },
            lastComment: 0
        };

        let deferredPrompt = null;

        // Commentary lines
        const lines = {
            start: ["Welcome! May the best team win!", "Let the math battle begin!", "Who will be the champion?"],
            t1good: ["Excellent Team 1!", "Blue team on fire!", "Amazing math skills!", "Team 1 dominates!"],
            t2good: ["Great job Team 2!", "Red team fights back!", "Fantastic answer!", "Team 2 is strong!"],
            t1bad: ["Keep trying Team 1!", "Don't give up Blue!", "Next time Team 1!", "Stay focused Blue!"],
            t2bad: ["Almost Team 2!", "Keep going Red!", "You can do it Team 2!", "Don't stop Red!"],
            close: ["So close!", "What a match!", "Anyone's game!", "Tension rising!"],
            win1: ["TEAM 1 WINS!", "Blue team champions!", "Victory for Team 1!", "Team 1 is unstoppable!"],
            win2: ["TEAM 2 WINS!", "Red team triumphs!", "Team 2 takes the crown!", "Amazing victory Team 2!"]
        };

        // Initialize
        function init() {
            newProblem(1);
            newProblem(2);
            startTimer();
            updateAll();
            speak(lines.start[0]);
            
            // Register service worker for PWA
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('data:text/javascript;base64,' + btoa(`
                    self.addEventListener('install', e => self.skipWaiting());
                    self.addEventListener('activate', e => e.waitUntil(clients.claim()));
                    self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => caches.match(e.request))));
                `)).catch(() => {});
            }
        }

        // Handle install prompt
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            setTimeout(() => {
                document.getElementById('installPrompt').classList.add('show');
            }, 3000);
        });

        function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(() => {
                    document.getElementById('installPrompt').classList.remove('show');
                    deferredPrompt = null;
                });
            }
        }

        function closeInstallPrompt() {
            document.getElementById('installPrompt').classList.remove('show');
        }

        // Generate problem
        function newProblem(team) {
            const ops = ['+', '-'];
            const op = ops[Math.random() > 0.5 ? 0 : 1];
            let a, b, ans;
            
            if (op === '+') {
                a = Math.floor(Math.random() * 12) + 2;
                b = Math.floor(Math.random() * 12) + 2;
                ans = a + b;
            } else {
                a = Math.floor(Math.random() * 15) + 5;
                b = Math.floor(Math.random() * a);
                ans = a - b;
            }
            
            state.problems[team] = { a, b, op, ans };
            document.getElementById(`prob${team}`).textContent = `${a} ${op} ${b} = ?`;
        }

        // Handle button press
        function pressKey(team, key) {
            if (state.ended) return;
            
            const display = document.getElementById(`ans${team}`);
            
            if (key === 'clear') {
                state.answers[team] = '';
                display.classList.remove('correct', 'wrong');
                updateAll();
                playSound(400, 0.05);
            }
            else if (key === 'submit') {
                checkAnswer(team);
            }
            else {
                if (state.answers[team].length < 2) {
                    state.answers[team] += key;
                    updateAll();
                    playSound(600 + (key * 50), 0.03);
                }
            }
        }

        // Check answer
        function checkAnswer(team) {
            const ans = parseInt(state.answers[team]);
            const correct = ans === state.problems[team].ans;
            const display = document.getElementById(`ans${team}`);
            
            if (correct) {
                display.classList.add('correct');
                state.scores[team]++;
                state.answers[team] = '';
                
                state.ropePos += (team === 1) ? -15 : 15;
                updateRope();
                
                const msgs = team === 1 ? lines.t1good : lines.t2good;
                speak(msgs[Math.floor(Math.random() * msgs.length)]);
                updateCommentary(msgs[Math.floor(Math.random() * msgs.length)]);
                
                if (Math.abs(state.ropePos) >= 100) {
                    setTimeout(() => endGame(team), 500);
                } else {
                    setTimeout(() => {
                        display.classList.remove('correct');
                        newProblem(team);
                        updateAll();
                    }, 600);
                }
            } else {
                display.classList.add('wrong');
                const msgs = team === 1 ? lines.t1bad : lines.t2bad;
                speak(msgs[Math.floor(Math.random() * msgs.length)]);
                
                setTimeout(() => {
                    state.answers[team] = '';
                    display.classList.remove('wrong');
                    updateAll();
                }, 600);
            }
            updateAll();
        }

        // Update rope position
        function updateRope() {
            const offset = state.ropePos * 1.5;
            document.getElementById('rope').style.transform = `translate(calc(-50% + ${offset}px), -50%)`;
            document.getElementById('flag').style.transform = `translate(calc(-50% + ${offset}px), -50%)`;
            document.getElementById('figs1').style.transform = `translateX(${offset}px)`;
            document.getElementById('figs2').style.transform = `translateX(${offset}px)`;
        }

        // Update all displays
        function updateAll() {
            document.getElementById('ans1').textContent = state.answers[1];
            document.getElementById('ans2').textContent = state.answers[2];
            document.getElementById('scoreBadge1').textContent = state.scores[1];
            document.getElementById('scoreBadge2').textContent = state.scores[2];
            document.getElementById('mainScore1').textContent = state.scores[1];
            document.getElementById('mainScore2').textContent = state.scores[2];
        }

        // Timer
        function startTimer() {
            state.timer = setInterval(() => {
                if (state.ended) return;
                const sec = Math.floor((Date.now() - state.startTime) / 1000);
                const m = Math.floor(sec / 60).toString().padStart(2, '0');
                const s = (sec % 60).toString().padStart(2, '0');
                document.getElementById('timer').textContent = `${m}:${s}`;
            }, 1000);
        }

        // End game
        function endGame(winner) {
            state.ended = true;
            clearInterval(state.timer);
            
            const time = document.getElementById('timer').textContent;
            const msgs = winner === 1 ? lines.win1 : lines.win2;
            const msg = msgs[Math.floor(Math.random() * msgs.length)];
            
            speak(msg);
            updateCommentary(msg);
            
            document.getElementById('winTitle').textContent = `Team ${winner} Wins!`;
            document.getElementById('winTitle').className = `winner-title w${winner}`;
            document.getElementById('winScore').textContent = state.scores[winner];
            document.getElementById('winTime').textContent = time;
            document.getElementById('winSub').textContent = winner === 1 ? "Blue team champions!" : "Red team triumphs!";
            
            document.getElementById('modal').classList.add('show');
            
            for (let i = 0; i < 50; i++) {
                setTimeout(makeConfetti, i * 30);
            }
            
            playVictory();
        }

        // Reset game
        function resetGame() {
            state.scores = { 1: 0, 2: 0 };
            state.answers = { 1: '', 2: '' };
            state.ropePos = 0;
            state.ended = false;
            state.startTime = Date.now();
            
            document.getElementById('modal').classList.remove('show');
            document.getElementById('ans1').classList.remove('correct', 'wrong');
            document.getElementById('ans2').classList.remove('correct', 'wrong');
            
            updateRope();
            newProblem(1);
            newProblem(2);
            startTimer();
            updateAll();
            speak("New game! Good luck!");
            updateCommentary("New game started! May the best team win!");
        }

        // Commentary
        function updateCommentary(text) {
            document.getElementById('commentary').textContent = text;
            state.lastComment = Date.now();
        }

        // Auto commentary
        setInterval(() => {
            if (state.ended) return;
            if (Date.now() - state.lastComment > 8000) {
                const diff = state.scores[1] - state.scores[2];
                let text;
                if (Math.abs(diff) <= 1 && state.scores[1] + state.scores[2] > 2) {
                    text = lines.close[Math.floor(Math.random() * lines.close.length)];
                } else if (diff > 1) {
                    text = lines.t1good[Math.floor(Math.random() * lines.t1good.length)];
                } else if (diff < -1) {
                    text = lines.t2good[Math.floor(Math.random() * lines.t2good.length)];
                } else {
                    text = lines.start[Math.floor(Math.random() * lines.start.length)];
                }
                updateCommentary(text);
                speak(text);
            }
        }, 2000);

        // Audio functions
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSound(freq, vol, duration = 0.1) {
            if (!state.audio.music || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(freq/2, audioCtx.currentTime + duration);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playVictory() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            [523, 659, 784, 1047].forEach((f, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.frequency.setValueAtTime(f, now + i*0.1);
                gain.gain.setValueAtTime(0.3, now + i*0.1);
                gain.gain.exponentialRampToValueAtTime(0.01, now + i*0.1 + 0.4);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now + i*0.1);
                osc.stop(now + i*0.1 + 0.4);
            });
        }

        function speak(text) {
            if (!state.audio.voice) return;
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text);
                u.rate = 1;
                u.pitch = 1.1;
                window.speechSynthesis.speak(u);
            }
        }

        function toggleAudio(type) {
            state.audio[type] = !state.audio[type];
            document.getElementById(`btn${type.charAt(0).toUpperCase() + type.slice(1)}`).classList.toggle('muted', !state.audio[type]);
            
            if (type === 'music' && state.audio.music) {
                initAudio();
            }
        }

        // Confetti
        function makeConfetti() {
            const c = document.createElement('div');
            c.className = 'confetti';
            c.style.left = Math.random() * 100 + 'vw';
            c.style.top = '-10px';
            c.style.backgroundColor = ['#2196F3', '#f44336', '#FFD700', '#4CAF50'][Math.floor(Math.random() * 4)];
            c.style.borderRadius = '50%';
            c.style.animation = `fall ${2 + Math.random()}s linear forwards`;
            document.body.appendChild(c);
            
            const style = document.createElement('style');
            style.textContent = `@keyframes fall { to { transform: translateY(100vh) rotate(360deg); opacity: 0; } }`;
            document.head.appendChild(style);
            
            setTimeout(() => c.remove(), 4000);
        }

        // Initialize on load
        window.addEventListener('load', () => {
            init();
            document.body.addEventListener('click', () => {
                initAudio();
            }, { once: true });
        });

        // Prevent zoom on double tap
        let lastTouchEnd = 0;
        document.addEventListener('touchend', (e) => {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                e.preventDefault();
            }
            lastTouchEnd = now;
        }, false);

        // Prevent pinch zoom
        document.addEventListener('touchmove', (e) => {
            if (e.touches.length > 1) {
                e.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
